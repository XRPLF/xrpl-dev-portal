<svg width="100%" viewBox="0 0 360 799" role="img" xmlns="http://www.w3.org/2000/svg">
  <style>
  text { font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
  .card   { fill: #ffffff; stroke: #E0E0E1; stroke-width: 1; }
  .action { fill: #111112; font-size: 15px; }
  .num    { fill: #ffffff; font-size: 13px; font-weight: 700; }
  .tx     { font-size: 12.5px; font-family: 'Space Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace; }
  .actor  { font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; }
  .arrow  { fill: none; stroke: #838386; stroke-width: 2; }
  .arrowhead { fill: #838386; }
  .seller { fill: #1E8A50; }
  .buyer  { fill: #006BB2; }
  .broker { fill: #9500B2; }
  @media (prefers-color-scheme: dark) {
    .card    { fill: #232325; stroke: #343437; }
    .action  { fill: #E0E0E1; }
    .arrow     { stroke: #838386; }
    .arrowhead { fill: #838386; }
    .seller  { fill: #32E685; }
    .buyer   { fill: #19A3FF; }
    .broker  { fill: #D919FF; }
  }
  </style>
  <title>NFT Brokered Sale Workflow (without Reserve)</title>
  <rect class="card" x="16" y="10" width="328" height="87" rx="8"/>
  <rect class="seller" x="16" y="20" width="4" height="67" rx="2"/>
  <circle class="seller" cx="324" cy="30" r="12"/>
  <text class="num" x="324" y="30" text-anchor="middle" dominant-baseline="central">1</text>
  <text class="actor seller" x="34" y="34">SELLER</text>
  <text class="action" x="34" y="56">Mints the NFT</text>
  <text class="tx seller" x="34" y="85">NFTokenMint</text>
  <path class="arrow" d="M 180 103 V 125"/>
  <polygon class="arrowhead" points="180,133 175,124 185,124"/>
  <rect class="card" x="16" y="137" width="328" height="106" rx="8"/>
  <rect class="buyer" x="16" y="147" width="4" height="86" rx="2"/>
  <circle class="buyer" cx="324" cy="157" r="12"/>
  <text class="num" x="324" y="157" text-anchor="middle" dominant-baseline="central">2</text>
  <text class="actor buyer" x="34" y="161">BIDDERS</text>
  <text class="action" x="34" y="183">Create offers,</text>
  <text class="action" x="34" y="202">broker as destination</text>
  <text class="tx buyer" x="34" y="231">NFTokenCreateOffer</text>
  <path class="arrow" d="M 180 249 V 271"/>
  <polygon class="arrowhead" points="180,279 175,270 185,270"/>
  <rect class="card" x="16" y="283" width="328" height="106" rx="8"/>
  <rect class="broker" x="16" y="293" width="4" height="86" rx="2"/>
  <circle class="broker" cx="324" cy="303" r="12"/>
  <text class="num" x="324" y="303" text-anchor="middle" dominant-baseline="central">3</text>
  <text class="actor broker" x="34" y="307">BROKER</text>
  <text class="action" x="34" y="329">Selects bid, subtracts fee,</text>
  <text class="action" x="34" y="348">requests seller sign-off</text>
  <text class="tx broker" x="34" y="377">NFTokenCreateOffer</text>
  <path class="arrow" d="M 180 395 V 417"/>
  <polygon class="arrowhead" points="180,425 175,416 185,416"/>
  <rect class="card" x="16" y="429" width="328" height="106" rx="8"/>
  <rect class="seller" x="16" y="439" width="4" height="86" rx="2"/>
  <circle class="seller" cx="324" cy="449" r="12"/>
  <text class="num" x="324" y="449" text-anchor="middle" dominant-baseline="central">4</text>
  <text class="actor seller" x="34" y="453">SELLER</text>
  <text class="action" x="34" y="475">Signs the offer,</text>
  <text class="action" x="34" y="494">broker as destination</text>
  <text class="tx seller" x="34" y="523">NFTokenCreateOffer</text>
  <path class="arrow" d="M 180 541 V 563"/>
  <polygon class="arrowhead" points="180,571 175,562 185,562"/>
  <rect class="card" x="16" y="575" width="328" height="87" rx="8"/>
  <rect class="broker" x="16" y="585" width="4" height="67" rx="2"/>
  <circle class="broker" cx="324" cy="595" r="12"/>
  <text class="num" x="324" y="595" text-anchor="middle" dominant-baseline="central">5</text>
  <text class="actor broker" x="34" y="599">BROKER</text>
  <text class="action" x="34" y="621">Completes sale, retains fee</text>
  <text class="tx broker" x="34" y="650">NFTokenAcceptOffer</text>
  <path class="arrow" d="M 180 668 V 690"/>
  <polygon class="arrowhead" points="180,698 175,689 185,689"/>
  <rect class="card" x="16" y="702" width="328" height="87" rx="8"/>
  <rect class="broker" x="16" y="712" width="4" height="67" rx="2"/>
  <circle class="broker" cx="324" cy="722" r="12"/>
  <text class="num" x="324" y="722" text-anchor="middle" dominant-baseline="central">6</text>
  <text class="actor broker" x="34" y="726">BROKER</text>
  <text class="action" x="34" y="748">Cancels remaining bids</text>
  <text class="tx broker" x="34" y="777">NFTokenCancelOffer</text>
</svg>
