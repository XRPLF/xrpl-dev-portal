<svg width="100%" viewBox="0 0 960 210" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <title>Custodial vs Non-custodial Wallets</title>
  <style>
    /* Decorative icons only. The comparison details live in the table below this
       image so they stay legible and reflow on small screens. The title color is
       theme-neutral so it reads on both light and dark page backgrounds. */
    .title { fill: #8a919a; }
  </style>

  <line x1="480" y1="20" x2="480" y2="200" stroke="#8a919a" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Custodial: bank -->
  <text class="title" x="240" y="56" font-size="26" font-weight="700" text-anchor="middle">Custodial</text>

  <polygon points="240,90 170,122 310,122" fill="#6b7280"/>
  <rect x="175" y="122" width="130" height="66" rx="2" fill="#6b7280"/>
  <rect x="185" y="130" width="14" height="52" rx="1" fill="#4b5563"/>
  <rect x="208" y="130" width="14" height="52" rx="1" fill="#4b5563"/>
  <rect x="231" y="130" width="14" height="52" rx="1" fill="#4b5563"/>
  <rect x="254" y="130" width="14" height="52" rx="1" fill="#4b5563"/>
  <rect x="277" y="130" width="14" height="52" rx="1" fill="#4b5563"/>
  <rect x="173" y="188" width="134" height="10" rx="2" fill="#6b7280"/>

  <!-- Non-custodial: key -->
  <text class="title" x="720" y="56" font-size="26" font-weight="700" text-anchor="middle">Non-custodial</text>

  <circle cx="713" cy="112" r="30" fill="none" stroke="#b0b8c4" stroke-width="13"/>
  <rect x="707" y="140" width="12" height="58" rx="3" fill="#6b7280"/>
  <rect x="719" y="158" width="20" height="11" rx="2" fill="#6b7280"/>
  <rect x="719" y="178" width="14" height="10" rx="2" fill="#6b7280"/>
</svg>
