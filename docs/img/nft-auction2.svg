<line x1="0" y1="436" x2="1492" y2="436" stroke="#c7ccc9" stroke-width="1"/>
<text x="104" y="160" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.5" fill="#72E38E">SELLER</text>
