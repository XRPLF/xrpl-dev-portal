# nav:
# Mirrors @theme/components/Navbar/constants/navigation.ts (the BDS-2026
# React navbar). Top-level items: Develop, Use Cases, Community, Network.
# Each top-level item's submenu groups are flattened from the navigation.ts
# left/right columns — the yaml renderer doesn't support the React navbar's
# 2-column layout, but the same items and links are present.

- group: Develop
  groupTranslationKey: navbar.develop
  items:
    - icon: ./static/img/icons/docs.svg
      label: Developer's Home || Your all-in-one blockchain developer portal.
      labelTranslationKey: topnav.develop.title || topnav.develop.description
      page: ./develop/index.page.tsx
    - group: Get Started
      groupTranslationKey: topnav.develop.get-started
      items:
        - label: XRPL Learning Portal
          labelTranslationKey: topnav.develop.learn
          href: https://learn.xrpl.org
          external: true
        - label: Code Samples
          labelTranslationKey: topnav.develop.code-samples
          href: /resources/code-samples
    - group: Docs
      groupTranslationKey: topnav.develop.docs
      items:
        - page: ./docs/index.page.tsx
          label: Documentation
          labelTranslationKey: topnav.develop.documentation
        - page: ./docs/references/index.md
          label: API Reference
          labelTranslationKey: topnav.develop.api-reference
        - page: ./docs/tutorials/index.page.tsx
          label: Tutorials
          labelTranslationKey: topnav.develop.tutorials
        - page: ./docs/concepts/index.md
          label: Concepts
          labelTranslationKey: topnav.develop.concepts
        - page: ./docs/infrastructure/index.md
          label: Infrastructure
          labelTranslationKey: topnav.develop.infrastructure
    - group: Client Libraries
      groupTranslationKey: topnav.develop.client-libraries
      items:
